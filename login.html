<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GChanger</title>
    <link rel="icon" type="image/png" href="assets/images/123.png"  />
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    
<header1>
    <img src="assets/images/logo1.png" alt="GChanger logo" class="logo1" width="100", height="100">
</header1>

    <header>
        <h2 class="logo">GChanger</h2>
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="about.html">About</a>
            <a href="service.html">Service</a>
            <a href="help.html">Contact</a>
            <button class="btnLogin-popup" onclick="location.href='register.html'">Register</button>
        </nav>
    </header>

    <div class="container">
        <!-- Login Form -->
    <div id="loginForm" class="form">
        <h2>Login</h2>
    <form id="loginForm">
        <span class="icon">
            <ion-icon name="mail"></ion-icon>
        </span>
        <input type="email" id="email" placeholder="Enter Email" required><br><br>
        <span class="icon">
            <ion-icon name="lock-closed"></ion-icon>
        </span>
        <input type="password" id="password" placeholder="Enter Password" required><br><br>
        <button type="submit" id="loginBtn">Login</button>
        <p>Don't have an account? <span id="showRegister" onclick="location.href='register.html'">Register</span></p>
    </form>
    </div>
    </div>

    
       
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
    
            let formData = new FormData();
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);
    
            fetch('http://localhost/gchanger/login.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.redirect) {
                    window.location.href = data.redirect;  // Redirect to dashboard
                }
            })
            .catch(error => console.error('Error:', error));
        });

    </script>
     <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
     <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
