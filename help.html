<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="icon" type="image/png" href="assets/images/123.png"  />
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a7d8f5, #ffffff);
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            inline-size: 80%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #fff;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.3);
        }
        .contact-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 20px 0;
            transition: 0.3s;
        }
        .contact-item:hover {
            background: #e3e4e6;
            transform: translateY(-5px);
        }
        .btn {
            display: inline-block;
            margin-block-start: 20px;
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            font-size: 1.3em;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #d43f3f;
            transform: scale(1.05);
        }

        header {
    position: fixed;
    inset-block-start: 0;
    inset-inline-start: 0;
    inline-size: 100%;
    padding: 20px 100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo1{
    display: flex;
    margin-inline-end: 5px;
    margin-block-start: 20px;
    padding: 5px 5px;
    font-size: 2em;
    color:rgba(31, 23, 71, 0.89);
    border: 5px black;
    user-select: none;
}

.logo {
    font-size: 2em;
    color: #004d7a;
    user-select: none;
}


/* Logo Animation */
@keyframes wavePulse {
    0% { transform: scale(1); filter: hue-rotate(0deg); }
    50% { transform: scale(1.1); filter: hue-rotate(180deg); }
    100% { transform: scale(1); filter: hue-rotate(360deg); }
}

.logo1 {
    inline-size: 100px;
    animation: wavePulse 2s infinite alternate ease-in-out;
}

    </style>
</head>
<body>
    <header1>
        <img src="assets/images/logo1.png" alt="GChanger logo" class="logo1" width="100", height="100">
    </header1>
    

    <h1>Contact Us</h1>
    <div class="container">
        <div class="contact-item">
            <h2>Email</h2>
            <p>grammarchanger@gmail.com</p>
        </div>
        <div class="contact-item">
            <h2>Phone</h2>
            <p>+91 12345 67890</p>
        </div>
        <div class="contact-item">
            <h2>Location</h2>
            <p>TAMIL NADU, KANCHIPURAM 631-501.</p>
        </div>
    </div>
    <a href="welcome.html" class="btn">Go to Home</a>
</body>
</html>
